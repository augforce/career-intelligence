<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Career Intelligence</title>
<script>(function(){try{var t=localStorage.getItem('ci-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&family=Sora:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/styles.css">
</head><body>
<header>
  <a class="brand" href="/">Career Intelligence<span class="dot">.</span></a>
  <nav>
    <a href="/settings">Filters</a>
    <a href="/watchlist">Watchlist</a>
    <a href="/history">History</a>
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode">Dark</button>
  </nav>
</header>
<main>{% block body %}{% endblock %}</main>
<script>
(function(){
  var b=document.getElementById('themeToggle');
  function cur(){return document.documentElement.getAttribute('data-theme')||'light';}
  function lbl(){if(b)b.textContent=cur()==='dark'?'Light':'Dark';}
  function set(t){document.documentElement.setAttribute('data-theme',t);try{localStorage.setItem('ci-theme',t);}catch(e){}lbl();}
  lbl(); if(b)b.addEventListener('click',function(){set(cur()==='dark'?'light':'dark');});
})();
</script>
</body></html>
